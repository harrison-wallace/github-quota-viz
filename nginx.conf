server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Proxy /api/* to the Express server running on port 3001
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Cache busting for SVG favicon - no cache
    location /github-color-svgrepo-com.svg {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        expires off;
    }

    # Block the old favicon.ico to prevent browser fallback
    location = /favicon.ico {
        return 404;
    }

    # Cache static assets with long expiry
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA routing - fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Deny access to .env files
    location ~ /\.env {
        deny all;
    }

    # Serve models.json with short-term caching to reduce load
    location = /models.json {
        add_header Cache-Control "public, max-age=3600";
        expires 1h;
        try_files $uri =404;
    }
}
